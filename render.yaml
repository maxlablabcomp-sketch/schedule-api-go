services:
  # Servicio Redis
  - type: redis
    name: schedule-redis
    plan: free
    maxmemoryPolicy: noeviction

  # Servicio Web con Docker - Sintaxis VERIFICADA
  - type: web
    name: schedule-api
    runtime: docker
    repo: https://github.com/maxlablabcomp-sketch/schedule-api-go
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 3000
      - key: REDIS_HOST
        fromService:
          name: schedule-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: schedule-redis
          type: redis
          property: port
      - key: CACHE_TTL
        value: 300000
      - key: UPDATE_INTERVAL
        value: 300000
      - key: API_BASE_URL
        value: https://cloud.urbe.edu/web/v1/core/labComp/rotafolio
    healthCheckPath: /health
    autoDeploy: true
