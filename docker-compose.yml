version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: schedule-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - schedule-network

  app:
    build: .
    container_name: schedule-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_TTL=300000
      - UPDATE_INTERVAL=300000
      - API_BASE_URL=https://cloud.urbe.edu/web/v1/core/labComp/rotafolio
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - schedule-network

volumes:
  redis-data:

networks:
  schedule-network:
    driver: bridge